
<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0">
<meta name="apple-mobile-web-app-capable" content="yes">
<meta name="apple-mobile-web-app-status-bar-style" content="default">
<meta name="apple-mobile-web-app-title" content="체크리스트">
<title>내 체크리스트</title>
<style>
* { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
:root {
  --bg: #f7f7f5; --surface: #ffffff;
  --border: rgba(0,0,0,0.08); --border-md: rgba(0,0,0,0.15);
  --text: #1a1a1a; --text-muted: #888; --text-hint: #bbb;
  --accent: #1a1a1a; --accent-fg: #ffffff;
  --radius: 12px; --radius-sm: 8px;
}
@media (prefers-color-scheme: dark) {
  :root {
    --bg: #141414; --surface: #1e1e1e;
    --border: rgba(255,255,255,0.08); --border-md: rgba(255,255,255,0.15);
    --text: #f0f0f0; --text-muted: #777; --text-hint: #444;
    --accent: #f0f0f0; --accent-fg: #141414;
  }
}
body { background: var(--bg); color: var(--text); font-family: -apple-system,'Helvetica Neue',sans-serif; min-height: 100vh; padding-bottom: env(safe-area-inset-bottom); }
.app { max-width: 600px; margin: 0 auto; padding: 20px 16px; }
.header { display: flex; align-items: center; justify-content: space-between; margin-bottom: 6px; }
.header h1 { font-size: 22px; font-weight: 600; letter-spacing: -0.5px; }
.header-right { display: flex; align-items: center; gap: 8px; }
.status-dot { width: 7px; height: 7px; border-radius: 50%; background: var(--text-hint); transition: background 0.3s; }
.status-dot.online { background: #2e7d52; }
.status-text { font-size: 12px; color: var(--text-muted); }
.reset-btn { font-size: 12px; color: var(--text-muted); cursor: pointer; border: 0.5px solid var(--border-md); background: none; padding: 5px 10px; border-radius: 20px; font-family: inherit; }
.date-label { font-size: 12px; color: var(--text-hint); margin-bottom: 20px; }
.tabs-wrap { display: flex; align-items: center; gap: 6px; margin-bottom: 20px; flex-wrap: wrap; }
.tab { padding: 6px 16px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; border: 0.5px solid var(--border-md); background: transparent; color: var(--text-muted); font-family: inherit; transition: all 0.15s; white-space: nowrap; }
.tab.active { background: var(--accent); color: var(--accent-fg); border-color: transparent; }
.tab-add { padding: 6px 12px; border-radius: 20px; font-size: 13px; cursor: pointer; border: 0.5px dashed var(--border-md); background: transparent; color: var(--text-hint); font-family: inherit; }
.new-cat-row { display: none; gap: 8px; margin-bottom: 16px; }
.new-cat-row.show { display: flex; }
.new-cat-row input { flex: 1; font-size: 14px; padding: 9px 12px; border-radius: var(--radius-sm); border: 0.5px solid var(--border-md); background: var(--surface); color: var(--text); font-family: inherit; outline: none; }
.new-cat-row button { padding: 9px 14px; border-radius: var(--radius-sm); border: 0.5px solid var(--border-md); background: transparent; color: var(--text); font-size: 13px; cursor: pointer; font-family: inherit; white-space: nowrap; }
.progress-wrap { margin-bottom: 16px; }
.progress-meta { display: flex; justify-content: space-between; font-size: 12px; color: var(--text-muted); margin-bottom: 6px; }
.progress-track { height: 3px; background: var(--border); border-radius: 2px; overflow: hidden; }
.progress-fill { height: 100%; background: var(--accent); border-radius: 2px; transition: width 0.35s ease; }
.add-row { display: flex; gap: 8px; margin-bottom: 14px; }
.add-row input { flex: 1; font-size: 15px; padding: 11px 14px; border-radius: var(--radius); border: 0.5px solid var(--border-md); background: var(--surface); color: var(--text); font-family: inherit; outline: none; -webkit-appearance: none; }
.add-row input::placeholder { color: var(--text-hint); }
.add-row input:focus { border-color: var(--accent); }
.add-row button { padding: 11px 18px; border-radius: var(--radius); border: none; background: var(--accent); color: var(--accent-fg); font-size: 15px; font-weight: 500; cursor: pointer; font-family: inherit; }
.checklist { display: flex; flex-direction: column; gap: 6px; }
.item { display: flex; align-items: center; gap: 12px; padding: 13px 14px; border-radius: var(--radius); border: 0.5px solid var(--border); background: var(--surface); transition: all 0.15s; animation: fadeIn 0.2s ease; }
@keyframes fadeIn { from { opacity:0; transform:translateY(-4px); } to { opacity:1; transform:translateY(0); } }
.item.done { opacity: 0.45; }
.checkbox { width: 22px; height: 22px; border-radius: 50%; border: 1.5px solid var(--border-md); cursor: pointer; display: flex; align-items: center; justify-content: center; flex-shrink: 0; transition: all 0.2s; background: transparent; }
.checkbox.checked { background: var(--accent); border-color: var(--accent); }
.checkmark { width: 10px; height: 7px; border-left: 2px solid var(--accent-fg); border-bottom: 2px solid var(--accent-fg); transform: rotate(-45deg) translate(1px,-1px); display: none; }
.checkbox.checked .checkmark { display: block; }
.item-text { flex: 1; font-size: 15px; color: var(--text); line-height: 1.4; }
.item.done .item-text { text-decoration: line-through; color: var(--text-muted); }
.del-btn { opacity: 0; font-size: 15px; cursor: pointer; color: var(--text-hint); border: none; background: none; padding: 4px 6px; border-radius: 4px; transition: opacity 0.15s; line-height: 1; flex-shrink: 0; }
.item:hover .del-btn { opacity: 1; }
@media (max-width: 480px) { .del-btn { opacity: 0.4; } }
.empty { text-align: center; padding: 40px 20px; color: var(--text-hint); font-size: 14px; }
</style>
</head>
<body>
<div class="app">
  <div class="header">
    <h1>체크리스트</h1>
    <div class="header-right">
      <div class="status-dot" id="status-dot"></div>
      <span class="status-text" id="status-text">연결 중</span>
      <button class="reset-btn" onclick="resetAll()">초기화</button>
    </div>
  </div>
  <div class="date-label" id="date-label"></div>
 
  <div class="tabs-wrap" id="tabs">
    <button class="tab active" onclick="switchTab('업무')" id="tab-업무">업무</button>
    <button class="tab" onclick="switchTab('개인')" id="tab-개인">개인</button>
    <button class="tab-add" onclick="showNewCat()">+ 카테고리</button>
  </div>
 
  <div class="new-cat-row" id="new-cat-row">
    <input type="text" id="new-cat-input" placeholder="카테고리 이름" onkeydown="if(event.key==='Enter')addCategory()">
    <button onclick="addCategory()">추가</button>
    <button onclick="hideNewCat()">취소</button>
  </div>
 
  <div class="progress-wrap">
    <div class="progress-meta">
      <span id="prog-label">0 / 0 완료</span>
      <span id="prog-pct">0%</span>
    </div>
    <div class="progress-track">
      <div class="progress-fill" id="prog-fill" style="width:0%"></div>
    </div>
  </div>
 
  <div class="add-row">
    <input type="text" id="new-item-input" placeholder="새 항목 추가..." onkeydown="if(event.key==='Enter')addItem()">
    <button onclick="addItem()">추가</button>
  </div>
 
  <div class="checklist" id="checklist"></div>
</div>
 
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
<script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
<script>
const firebaseConfig = {
  apiKey: "AIzaSyDMg-MOtRaCGjxUV_D5HsViC1-QIz0cbfc",
  authDomain: "my-checklist-1d462.firebaseapp.com",
  projectId: "my-checklist-1d462",
  storageBucket: "my-checklist-1d462.firebasestorage.app",
  messagingSenderId: "317489669655",
  appId: "1:317489669655:web:13613cec58ffe3f0b19e52"
};
firebase.initializeApp(firebaseConfig);
const db = firebase.firestore();
 
let currentTab = '업무';
let categories = ['업무', '개인'];
let data = {};
let unsubscribe = null;
const today = new Date().toISOString().slice(0, 10);
 
document.getElementById('date-label').textContent =
  new Date().toLocaleDateString('ko-KR', { year:'numeric', month:'long', day:'numeric', weekday:'short' });
 
function initData() { categories.forEach(c => { if (!data[c]) data[c] = []; }); }
 
function setStatus(online) {
  document.getElementById('status-dot').className = 'status-dot' + (online ? ' online' : '');
  document.getElementById('status-text').textContent = online ? '동기화됨' : '오프라인';
}
 
function switchTab(cat) {
  currentTab = cat;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  const el = document.getElementById('tab-' + cat);
  if (el) el.classList.add('active');
  render();
}
 
function showNewCat() {
  document.getElementById('new-cat-row').classList.add('show');
  document.getElementById('new-cat-input').focus();
}
function hideNewCat() {
  document.getElementById('new-cat-row').classList.remove('show');
  document.getElementById('new-cat-input').value = '';
}
 
function addCategory() {
  const name = document.getElementById('new-cat-input').value.trim();
  if (!name || categories.includes(name)) return;
  categories.push(name);
  data[name] = [];
  const tabs = document.getElementById('tabs');
  const addBtn = tabs.querySelector('.tab-add');
  const btn = document.createElement('button');
  btn.className = 'tab';
  btn.id = 'tab-' + name;
  btn.textContent = name;
  btn.onclick = () => switchTab(name);
  tabs.insertBefore(btn, addBtn);
  hideNewCat();
  save();
  switchTab(name);
}
 
function addItem() {
  const input = document.getElementById('new-item-input');
  const text = input.value.trim();
  if (!text) return;
  if (!data[currentTab]) data[currentTab] = [];
  data[currentTab].push({ id: Date.now().toString(), text, done: false });
  input.value = '';
  save();
  render();
}
 
function toggleItem(id) {
  const item = (data[currentTab] || []).find(i => i.id === id);
  if (item) { item.done = !item.done; save(); render(); }
}
 
function deleteItem(id) {
  if (!data[currentTab]) return;
  data[currentTab] = data[currentTab].filter(i => i.id !== id);
  save();
  render();
}
 
function resetAll() {
  if (!data[currentTab]) return;
  data[currentTab].forEach(i => i.done = false);
  save();
  render();
}
 
function escapeHtml(s) {
  return s.replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
}
 
function render() {
  const items = data[currentTab] || [];
  const done = items.filter(i => i.done).length;
  const total = items.length;
  const pct = total ? Math.round((done / total) * 100) : 0;
  document.getElementById('prog-label').textContent = `${done} / ${total} 완료`;
  document.getElementById('prog-pct').textContent = `${pct}%`;
  document.getElementById('prog-fill').style.width = pct + '%';
  const list = document.getElementById('checklist');
  if (!items.length) {
    list.innerHTML = '<div class="empty">항목을 추가해 보세요</div>';
    return;
  }
  list.innerHTML = items.map(item => `
    <div class="item ${item.done ? 'done' : ''}">
      <div class="checkbox ${item.done ? 'checked' : ''}" onclick="toggleItem('${item.id}')">
        <div class="checkmark"></div>
      </div>
      <span class="item-text">${escapeHtml(item.text)}</span>
      <button class="del-btn" onclick="deleteItem('${item.id}')">✕</button>
    </div>
  `).join('');
}
 
function save() {
  db.collection('checklists').doc(today).set({ data, categories })
    .then(() => setStatus(true))
    .catch(() => setStatus(false));
}
 
function load() {
  if (unsubscribe) unsubscribe();
  unsubscribe = db.collection('checklists').doc(today)
    .onSnapshot(doc => {
      setStatus(true);
      if (doc.exists) {
        const d = doc.data();
        if (d.categories) {
          d.categories.forEach(cat => {
            if (!categories.includes(cat)) {
              categories.push(cat);
              const tabs = document.getElementById('tabs');
              const addBtn = tabs.querySelector('.tab-add');
              const btn = document.createElement('button');
              btn.className = 'tab'; btn.id = 'tab-' + cat;
              btn.textContent = cat; btn.onclick = () => switchTab(cat);
              tabs.insertBefore(btn, addBtn);
            }
          });
        }
        if (d.data) data = d.data;
      }
      initData();
      render();
    }, () => { setStatus(false); initData(); render(); });
}
 
initData(); render(); load();
</script>
</body>
</html>
